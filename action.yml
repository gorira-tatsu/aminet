name: "aminet Supply Chain Review"
description: "Analyze dependency changes in pull requests for security, license, and vulnerability issues"
branding:
  icon: shield
  color: red
inputs:
  path:
    description: "Path to package.json"
    default: "package.json"
  depth:
    description: "Maximum dependency depth"
    required: false
  deny-license:
    description: "Comma-separated list of SPDX IDs to deny"
    required: false
  fail-on-vuln:
    description: "Exit non-zero on vulnerabilities at or above severity"
    required: false
  security:
    description: "Enable security deep analysis"
    default: "true"
  version:
    description: "Published aminet version to execute. If omitted, release-tag usage resolves from GITHUB_ACTION_REF; repo-local usage falls back to dist/index.js when available."
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Run aminet review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        GITHUB_ACTION_REF: ${{ github.action_ref }}
      run: |
        VERSION="${{ inputs.version }}"
        ACTION_PATH="$GITHUB_ACTION_PATH"
        ACTION_REF="$GITHUB_ACTION_REF"
        LOCAL_ENTRY="$ACTION_PATH/dist/index.js"

        ARGS="${{ inputs.path }} --base ${{ github.event.pull_request.base.sha }}"
        ARGS="$ARGS --pr-number ${{ github.event.pull_request.number }}"
        ARGS="$ARGS --repo ${{ github.repository }}"
        ARGS="$ARGS --update-comment"

        if [ -n "${{ inputs.depth }}" ]; then
          ARGS="$ARGS --depth ${{ inputs.depth }}"
        fi
        if [ -n "${{ inputs.deny-license }}" ]; then
          ARGS="$ARGS --deny-license ${{ inputs.deny-license }}"
        fi
        if [ -n "${{ inputs.fail-on-vuln }}" ]; then
          ARGS="$ARGS --fail-on-vuln ${{ inputs.fail-on-vuln }}"
        fi
        if [ "${{ inputs.security }}" = "true" ]; then
          ARGS="$ARGS --security"
        fi

        if [ -n "$VERSION" ]; then
          npx --yes aminet@"$VERSION" review $ARGS
          exit 0
        fi

        if [ -n "$ACTION_REF" ] && [[ "$ACTION_REF" == v* ]]; then
          npx --yes aminet@"${ACTION_REF#v}" review $ARGS
          exit 0
        fi

        if [ -f "$LOCAL_ENTRY" ]; then
          node "$LOCAL_ENTRY" review $ARGS
          exit 0
        fi

        echo "Unable to determine which aminet version to run. Pass the 'version' input or use a released action tag." >&2
        exit 1
