name: "aminet Supply Chain Review"
description: "Analyze dependency changes in pull requests for security, license, and vulnerability issues"
branding:
  icon: shield
  color: red
inputs:
  path:
    description: "Path to package.json"
    default: "package.json"
  depth:
    description: "Maximum dependency depth"
    required: false
  deny-license:
    description: "Comma-separated list of SPDX IDs to deny"
    required: false
  fail-on-vuln:
    description: "Exit non-zero on vulnerabilities at or above severity"
    required: false
  security:
    description: "Enable security deep analysis"
    default: "true"
  version:
    description: "aminet package version to execute (defaults to this action's version)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Run aminet review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ inputs.version }}"
        if [ -z "$VERSION" ]; then
          VERSION=$(node -e "const fs=require('node:fs'); const path=require('node:path'); const pkg=JSON.parse(fs.readFileSync(path.join('${{ github.action_path }}','package.json'),'utf8')); process.stdout.write(pkg.version)")
        fi

        ARGS="${{ inputs.path }} --base ${{ github.event.pull_request.base.sha }}"
        ARGS="$ARGS --pr-number ${{ github.event.pull_request.number }}"
        ARGS="$ARGS --repo ${{ github.repository }}"
        ARGS="$ARGS --update-comment"

        if [ -n "${{ inputs.depth }}" ]; then
          ARGS="$ARGS --depth ${{ inputs.depth }}"
        fi
        if [ -n "${{ inputs.deny-license }}" ]; then
          ARGS="$ARGS --deny-license ${{ inputs.deny-license }}"
        fi
        if [ -n "${{ inputs.fail-on-vuln }}" ]; then
          ARGS="$ARGS --fail-on-vuln ${{ inputs.fail-on-vuln }}"
        fi
        if [ "${{ inputs.security }}" = "true" ]; then
          ARGS="$ARGS --security"
        fi

        npx --yes aminet@"$VERSION" review $ARGS
