name: ami Dependency Review

on:
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "package-lock.json"

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          path: package.json
          security: "true"
