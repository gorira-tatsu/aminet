name: Publish aminet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); process.stdout.write(pkg.version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm lint
          pnpm test
          pnpm build

      - name: Build release notes body
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            const generated = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace("refs/tags/", ""),
              target_commitish: context.sha,
            });

            const npmUrl = "https://www.npmjs.com/package/aminet";
            const body = [
              `## aminet ${version}`,
              "",
              `npm: ${npmUrl}`,
              "",
              "### Install",
              "",
              "```bash",
              `npx aminet@${version} --help`,
              "npm install -g aminet",
              "```",
              "",
              "### GitHub Action",
              "",
              "```yaml",
              `uses: ${context.repo.owner}/${context.repo.repo}@v${version}`,
              "```",
              "",
              "npmjs.org is the canonical package registry for aminet.",
              "",
              "---",
              "",
              generated.data.body,
              "",
            ].join("\n");
            const fs = require("node:fs");
            fs.writeFileSync("release-notes.md", body);

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
