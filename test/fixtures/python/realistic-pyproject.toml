[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "realistic-app"
version = "0.2.0"
dependencies = [
  "httpx>=0.27",
  "sqlalchemy>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "coverage[toml]>=7.6",
]
lint = [
  "ruff==0.12.0",
]
ci = [
  "pre-commit>=4.0",
]

[dependency-groups]
docs = [
  "mkdocs-material>=9.5",
  { include-group = "typing" },
]
typing = [
  "mypy>=1.11",
]
qa = [
  "bandit>=1.8",
]

[tool.ruff]
line-length = 100
